# Liquibase Configuration for Strands Database
# PostgreSQL Database Configuration
driver=org.postgresql.Driver
url=jdbc:postgresql://localhost:5432/strands
username=your_username
password=your_password

# Liquibase Configuration
changeLogFile=changelog.xml
liquibaseSchemaName=liquibase

# Output Configuration
outputDefaultCatalog=false
outputDefaultSchema=false

# Logging
logLevel=INFO

# Change Log Parameters
contexts=development,test,production